        - name: Authorization
          in: header
          schema:
            type: string
          example: >-
            Bearer
            eyJhbGciOiJIUz
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /stocks/buy:
    post:
      tags:
        - Stocks
      summary: Buy Stocks
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                symbol: NVDA
                quantity: 5
                wallet_id: "1"
      security:
        - BearerAuth: []
      parameters:
        - name: x-api-key
          in: header
          schema:
            type: string
          example: x-api-key
        - name: Authorization
          in: header
          schema:
            type: string
          example: >-
            Bearer
            eyJhb
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /stocks/sell:
    post:
      tags:
        - Stocks
      summary: Sell Stocks
      requestBody:
        content:
          application/json:
            schema:
