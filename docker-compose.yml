services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-myappdb}
    ports:
      - "${DB_PORT:-5432}:5432" # host:container — override the host port via DB_PORT
    volumes:
      - pgdata:/var/lib/postgresql/data # Persists data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-5000}:5000" # host:container — override the host port via APP_PORT
    depends_on:
      - db
    environment:
      - FLASK_ENV=production # App is served by gunicorn with debug disabled
      - FLASK_APP=app.index
      # Built from the same POSTGRES_* vars as the db service so the two can't
      # drift. Host is the `db` service and the port is always the container's
      # internal 5432 (not DB_PORT, which only changes the published host port).
      # This overrides any SQLALCHEMY_DATABASE_URI in the .env file below.
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-myappdb}
    env_file:
      - .env
    working_dir: /app

volumes:
  pgdata: # Named volume for data persistence
